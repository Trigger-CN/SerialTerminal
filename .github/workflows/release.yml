name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync version from tag
        shell: bash
        run: |
          # 提取 tag 版本号 (去掉 v 前缀)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Syncing version to $VERSION"
          # 更新 package.json 版本号，不产生 git tag
          npm version $VERSION --no-git-tag-version

      - name: Remove .npmrc
        shell: bash
        run: rm -f .npmrc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libfuse2

      - name: Build Changelog
        if: matrix.os == 'ubuntu-latest'
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                    "title": "## 🚀 Features",
                    "labels": ["feat", "feature"]
                },
                {
                    "title": "## 🐛 Fixes",
                    "labels": ["fix", "bug"]
                },
                {
                    "title": "## 📦 Other Changes",
                    "labels": []
                }
              ]
            }

      - name: Update Release Body
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.build_changelog.outputs.changelog }}

            ## 📦 Downloads / 产物下载
            请在下方的 **Assets** 区域下载安装包：
            - **Windows**: 使用 `.exe` (安装版) 或 `.exe` (便携版)
            - **Linux**: 使用 `.AppImage` 或 `.deb`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npm run dist:win -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
