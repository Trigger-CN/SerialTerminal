name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync version from tag
        shell: bash
        run: |
          # 提取 tag 版本号 (去掉 v 前缀)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Syncing version to $VERSION"
          # 更新 package.json 版本号，不产生 git tag
          npm version $VERSION --no-git-tag-version

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up MSBuild
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Set up Visual Studio Developer Command Prompt
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Visual Studio C++ Build Tools
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --locale en-US" -y --no-progress

      - name: Remove .npmrc
        shell: bash
        run: |
          rm -f .npmrc
          npm config set registry https://registry.npmjs.org/

      - name: Show Windows build environment
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Write-Host "npm registry: $(npm config get registry)"
          Write-Host "cl path: $((Get-Command cl.exe -ErrorAction SilentlyContinue).Source)"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            & $vswhere -all -products * -format json
          } else {
            Write-Host "vswhere not found"
          }
          npm --version
          node --version

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Rebuild Native Dependencies for Electron
        if: matrix.os == 'windows-latest'
        run: npx electron-builder install-app-deps

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libfuse2

      - name: Rebuild Native Dependencies for Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder install-app-deps

      - name: Build Changelog
        if: matrix.os == 'ubuntu-latest'
        id: build_changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "$CURRENT_TAG" | head -n 1)

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
            echo "Using range: $RANGE"
            COMMITS=$(git log "$RANGE" --pretty=format:'%s|%h' --no-merges)
          else
            echo "No previous tag found, using full history"
            COMMITS=$(git log --pretty=format:'%s|%h' --no-merges)
          fi

          FEATURES=""
          FIXES=""
          DOCS=""
          REFACTOR=""
          CHORE=""
          OTHER=""

          while IFS='|' read -r SUBJECT HASH; do
            [ -z "$SUBJECT" ] && continue
            ENTRY="- ${SUBJECT} (${HASH})"

            case "$SUBJECT" in
              feat:*|feature:*) FEATURES+="$ENTRY"$'\n' ;;
              fix:*|bugfix:*|hotfix:*) FIXES+="$ENTRY"$'\n' ;;
              docs:*|doc:*) DOCS+="$ENTRY"$'\n' ;;
              refactor:*|perf:*|style:*) REFACTOR+="$ENTRY"$'\n' ;;
              chore:*|build:*|ci:*|test:*) CHORE+="$ENTRY"$'\n' ;;
              *) OTHER+="$ENTRY"$'\n' ;;
            esac
          done <<< "$COMMITS"

          CHANGELOG="## Changes"

          append_section() {
            local title="$1"
            local content="$2"
            if [ -n "$content" ]; then
              CHANGELOG+=$'\n\n'
              CHANGELOG+="$title"
              CHANGELOG+=$'\n'
              CHANGELOG+="${content%$'\n'}"
            fi
          }

          append_section "### 🚀 Features" "$FEATURES"
          append_section "### 🐛 Fixes" "$FIXES"
          append_section "### 📝 Documentation" "$DOCS"
          append_section "### ♻️ Refactor & Improvements" "$REFACTOR"
          append_section "### 🔧 Chore / CI / Test" "$CHORE"
          append_section "### 📦 Other Changes" "$OTHER"

          if [ "$CHANGELOG" = "## Changes" ]; then
            CHANGELOG=$'## Changes\n\n- no changes'
          fi

          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update Release Body
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.build_changelog.outputs.changelog }}

            ## 📦 Downloads / 产物下载
            请在下方的 **Assets** 区域下载安装包：
            - **Windows**: 使用 `.exe` (安装版) 或 `.exe` (便携版)
            - **Linux**: 使用 `.AppImage` 或 `.deb`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
